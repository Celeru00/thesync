name: Frontend CI

on:
  pull_request:
    paths:
      - "thesync-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "thesync-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: thesync-frontend

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: thesync-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: make ci-check
